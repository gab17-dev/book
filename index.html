<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story</title>

<link rel="stylesheet" href="style.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond&display=swap" rel="stylesheet">
</head>
<body>

<div class="book-container">

  <div id="book" class="book">

    <!-- PAPER 1 -->
    <div class="paper">
      <div class="front cover">
        <h1>Our Story</h1>
        <p>Alex & Jamie</p>
        <p>June 14</p>
      </div>
      <div class="back">
        <h2>My Love</h2>
        <p>This is where your letter goes...</p>
      </div>
    </div>

    <!-- PAPER 2 -->
    <div class="paper">
      <div class="front">
        <h2>Timeline</h2>
        <p>First Date ❤️</p>
        <p>First Trip ✈️</p>
      </div>
      <div class="back">
        <h2>More Memories</h2>
        <p>Moving in together 🏡</p>
      </div>
    </div>

    <!-- PAPER 3 -->
    <div class="paper">
      <div class="front">
        <h2>Gallery</h2>
        <img src="https://via.placeholder.com/200">
      </div>
      <div class="back cover">
        <h2>Forever With You</h2>
        <p>© 2026</p>
      </div>
    </div>

  </div>

  <!-- NAV -->
  <div class="controls">
    <button id="prev">⟵</button>
    <button id="next">⟶</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
